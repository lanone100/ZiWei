<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>紫微斗數 · 命盤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===================== RESET ===================== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ===================== TOKENS ===================== */
:root{
  --bg:#EFEFF4;
  --bg-card:rgba(255,255,255,0.88);
  --bg-input:rgba(255,255,255,0.96);
  --bg-cell:rgba(255,255,255,0.76);
  --surface:rgba(255,255,255,0.6);
  --border:rgba(0,0,0,0.09);
  --t1:#17172A;--t2:#636375;--t3:#AAAAB8;
  --blur:blur(20px) saturate(160%);
  --sh-xs:0 1px 4px rgba(0,0,0,0.06);
  --sh-sm:0 4px 12px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04);
  --sh-md:0 10px 30px rgba(0,0,0,0.09),0 2px 6px rgba(0,0,0,0.05);
  --sh-lg:0 20px 56px rgba(0,0,0,0.11),0 4px 10px rgba(0,0,0,0.06);
  --indigo:#5856D6;--blue:#007AFF;--green:#34C759;
  --orange:#FF9500;--red:#FF3B30;--purple:#AF52DE;
  --g-header:linear-gradient(130deg,#5856D6 0%,#AF52DE 100%);
  --g-accent:linear-gradient(130deg,#007AFF 0%,#5856D6 100%);
  --g-warm:linear-gradient(130deg,#FF9500 0%,#FF3B30 100%);
  --r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:32px;
  --s-main:#FF3B30;--s-blue:#007AFF;--s-dark:#17172A;
}
body.dark{
  --bg:#0D0D1A;--bg-card:rgba(22,22,36,0.90);--bg-input:rgba(28,28,44,0.96);
  --bg-cell:rgba(26,26,42,0.80);--surface:rgba(34,34,52,0.65);
  --border:rgba(255,255,255,0.09);
  --t1:#EDEDFF;--t2:#9090B0;--t3:#50506A;
  --sh-xs:0 1px 4px rgba(0,0,0,0.4);--sh-sm:0 4px 12px rgba(0,0,0,0.45);
  --sh-md:0 10px 30px rgba(0,0,0,0.55);--sh-lg:0 20px 56px rgba(0,0,0,0.65);
  --indigo:#7977F5;--blue:#0A84FF;--green:#32D74B;
  --orange:#FF9F0A;--red:#FF453A;--purple:#BF5AF2;
  --s-dark:#DDDDF5;
}

/* ===================== BASE ===================== */
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;
  background:var(--bg);color:var(--t1);min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background .4s,color .4s;overflow-x:hidden;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 40% at 15% 8%,rgba(88,86,214,.12) 0%,transparent 65%),
    radial-gradient(ellipse 45% 32% at 85% 85%,rgba(0,122,255,.09) 0%,transparent 60%),
    radial-gradient(ellipse 38% 28% at 58% 28%,rgba(175,82,222,.08) 0%,transparent 55%);
}
body.dark::after{
  background:
    radial-gradient(ellipse 55% 40% at 15% 8%,rgba(121,119,245,.22) 0%,transparent 65%),
    radial-gradient(ellipse 45% 32% at 85% 85%,rgba(10,132,255,.17) 0%,transparent 60%),
    radial-gradient(ellipse 38% 28% at 58% 28%,rgba(191,90,242,.14) 0%,transparent 55%);
}

/* ===================== APP WRAPPER ===================== */
#app{
  position:relative;z-index:1;
  max-width:560px;margin:0 auto;
  padding:clamp(14px,4vw,28px) clamp(12px,4vw,20px) 60px;
}

/* ===================== PC HORIZONTAL LAYOUT ===================== */
@media(min-width:960px){
  body{min-height:100vh}
  #app{
    max-width:1320px;width:100%;
    padding:28px 32px 48px;
  }
  /* Full-width header */
  .hdr{margin-bottom:24px}
  .hdr-title{font-size:2.1rem}

  /* 3-column grid: left panel | chart | right panel */
  .pc-row{
    display:grid;
    grid-template-columns:300px 1fr 320px;
    grid-template-rows:auto;
    gap:18px;
    align-items:start;
  }

  /* Left column: input card + formula card */
  .pc-left  {grid-column:1;grid-row:1}
  .pc-left2 {grid-column:1;grid-row:2}

  /* Center column: tabs + year bar + chart */
  .pc-center{grid-column:2;grid-row:1/3}

  /* Right column: explain */
  .pc-right {grid-column:3;grid-row:1/3}

  /* footer spans all */
  .pc-foot{grid-column:1/-1}

  /* chart should fill the column height nicely */
  .chart-wrap{margin-bottom:0}
  .pc-center .chart-wrap{
    /* chart square: fill column width */
  }

  /* remove bottom margin from last left-col card */
  .pc-left2{margin-bottom:0}

  /* explain card fills full right height */
  .ex-card{
    height:100%;
    margin-bottom:0;
    display:flex;flex-direction:column;
  }
  .ex-body{flex:1;overflow-y:auto}

  /* formula card no bottom margin */
  .pc-left2.card{margin-bottom:0}
}

/* ===================== GLASS CARD ===================== */
.card{
  background:var(--bg-card);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border);border-radius:var(--r-xl);
  padding:clamp(14px,3.5vw,22px) clamp(13px,3.5vw,20px);
  box-shadow:var(--sh-md);margin-bottom:14px;
  transition:background .4s,border-color .4s;
}
.card-lbl{
  display:flex;align-items:center;gap:7px;
  font-size:.7rem;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--t2);margin-bottom:13px;
}
.card-lbl i{width:7px;height:7px;border-radius:50%;background:var(--indigo);flex-shrink:0}

/* ===================== HEADER ===================== */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:20px}
.hdr-eyebrow{font-size:.67rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--indigo);margin-bottom:3px}
.hdr-title{
  font-family:'Noto Serif TC',serif;
  font-size:clamp(1.45rem,5.5vw,2rem);
  font-weight:900;letter-spacing:-.02em;line-height:1.1;
  background:var(--g-header);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.btn-theme{
  width:44px;height:44px;border-radius:50%;
  background:var(--bg-card);backdrop-filter:var(--blur);
  border:1px solid var(--border);box-shadow:var(--sh-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;cursor:pointer;flex-shrink:0;
  transition:transform .2s,background .3s;
}
.btn-theme:active{transform:scale(.88)}

/* ===================== FORM ===================== */
.form-row{display:grid;grid-template-columns:1.55fr 1fr;gap:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.69rem;font-weight:700;color:var(--t2);letter-spacing:.06em}
.field input,.field select{
  width:100%;padding:12px 13px;
  background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--r-md);
  font-family:'Noto Sans TC',sans-serif;font-size:clamp(.87rem,3.8vw,.99rem);
  color:var(--t1);outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color .2s,box-shadow .2s,background .4s;
}
.field input:focus,.field select:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(88,86,214,.16)}
.sel-w{position:relative}
.sel-w::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:.82rem;pointer-events:none}
.hist-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.hist-chip{
  font-size:.7rem;font-weight:600;padding:3px 9px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;color:var(--indigo);cursor:pointer;
  transition:background .15s,color .15s;
}
.hist-chip:active{background:var(--indigo);color:#fff}
.btn-submit{
  width:100%;margin-top:12px;padding:14px;
  background:var(--g-accent);border-radius:var(--r-lg);
  font-size:clamp(.88rem,3.8vw,.99rem);font-weight:700;color:#fff;
  box-shadow:0 5px 18px rgba(88,86,214,.36);letter-spacing:.04em;
  position:relative;overflow:hidden;transition:opacity .15s,transform .15s;
}
.btn-submit::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.13) 0%,transparent 55%);pointer-events:none}
.btn-submit:active{opacity:.82;transform:scale(.98)}

/* ===================== TABS ===================== */
.tabs{
  display:flex;background:var(--bg-card);backdrop-filter:var(--blur);
  border:1px solid var(--border);border-radius:48px;
  padding:4px;margin-bottom:11px;box-shadow:var(--sh-xs);
}
.tab{
  flex:1;text-align:center;padding:9px 6px;border-radius:44px;
  font-size:clamp(.8rem,3.5vw,.95rem);font-weight:600;
  color:var(--t2);cursor:pointer;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);letter-spacing:.02em;
}
.tab.on{background:var(--bg-input);color:var(--indigo);box-shadow:var(--sh-xs);transform:scale(1.02)}

/* ===================== YEAR BAR ===================== */
.yr-bar{
  display:none;align-items:center;gap:9px;flex-wrap:wrap;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:10px 14px;
  margin-bottom:11px;box-shadow:var(--sh-xs);
}
.yr-bar.show{display:flex}
.yr-bar label{font-size:.76rem;font-weight:700;color:var(--t2);white-space:nowrap}
.yr-bar select{
  flex:1;min-width:130px;padding:8px 12px;
  background:var(--bg-input);border:1.5px solid var(--border);border-radius:22px;
  font-family:'Noto Sans TC',sans-serif;font-size:.88rem;
  color:var(--t1);outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;
}

/* ===================== CHART WRAP ===================== */
.chart-wrap{
  background:var(--bg-card);backdrop-filter:var(--blur);
  border:1px solid var(--border);border-radius:var(--r-xl);
  padding:clamp(6px,2vw,12px);box-shadow:var(--sh-lg);margin-bottom:14px;
}

/* ---- 4×4 GRID — square, fluid ---- */
.grid4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:clamp(3px,1.2vw,7px);
  /* force square */
  width:100%;
  aspect-ratio:1/1;
}

/* CELL */
.cell{
  background:var(--bg-cell);
  border:1px solid var(--border);
  border-radius:clamp(6px,1.5vw,11px);
  display:flex;flex-direction:column;
  justify-content:space-between;align-items:stretch;
  position:relative;overflow:hidden;cursor:pointer;
  /* fluid inner padding */
  padding:clamp(3px,1vw,8px) clamp(2px,.7vw,5px) clamp(2px,.8vw,6px);
  transition:transform .15s,border-color .2s,background .2s,box-shadow .2s;
}
.cell::before{
  content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;
  background:linear-gradient(170deg,rgba(255,255,255,.07) 0%,transparent 55%);
}
.cell:active{transform:scale(.93)}
.cell.sel{border-color:var(--indigo);background:rgba(88,86,214,.07);box-shadow:0 0 0 2px rgba(88,86,214,.2),var(--sh-xs)}
.cell.ann{border-color:var(--orange);background:rgba(255,149,0,.07);box-shadow:0 0 0 2px rgba(255,149,0,.2)}

/* STARS AREA — horizontal row of vertical text */
.stars-area{
  display:flex;flex-direction:row;flex-wrap:wrap;
  justify-content:center;align-items:flex-start;
  gap:clamp(1px,.4vw,3px);
  flex:1;overflow:hidden;
  padding:clamp(1px,.4vw,3px) clamp(1px,.4vw,3px) 0;
}
.star{
  font-family:'Noto Serif TC',serif;font-weight:700;
  writing-mode:vertical-rl;transform:rotate(180deg);
  line-height:1.1;color:var(--s-dark);position:relative;
  /* true fluid: scales with 25% cell width = 6.25% viewport width */
  font-size:clamp(.5rem,1.7vw,.84rem);
  flex-shrink:0;
}
.star.m{color:var(--s-main)}
.star.b{color:var(--s-blue)}

/* hua badge */
.hb{
  position:absolute;top:-1px;right:-5px;
  writing-mode:horizontal-tb;transform:rotate(0);
  font-family:'Noto Sans TC',sans-serif;
  font-size:clamp(.36rem,.85vw,.5rem);font-weight:800;
  padding:1px 2px;border-radius:3px;line-height:1.2;
  white-space:nowrap;pointer-events:none;
}
.hb.lu{background:var(--green);color:#fff}
.hb.quan{background:var(--blue);color:#fff}
.hb.ke{background:var(--purple);color:#fff}
.hb.ji{background:var(--red);color:#fff}

/* PALACE NAME PILL */
.pname{
  font-size:clamp(.48rem,1.65vw,.8rem);
  font-weight:700;background:var(--g-accent);color:#fff;
  text-align:center;border-radius:18px;
  padding:clamp(1px,.4vw,3px) clamp(2px,.5vw,4px);
  margin:clamp(2px,.5vw,4px) clamp(2px,.5vw,4px) 0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.01em;
}

/* BRANCH */
.zhi{
  position:absolute;bottom:clamp(2px,.5vw,4px);left:clamp(3px,.7vw,6px);
  font-size:clamp(.38rem,1.2vw,.62rem);font-weight:700;
  color:var(--t3);background:rgba(128,128,160,.11);
  padding:0 clamp(2px,.4vw,4px);border-radius:18px;
}

/* AGE TAG */
.age{
  position:absolute;top:clamp(2px,.5vw,4px);right:clamp(2px,.5vw,5px);
  font-size:clamp(.34rem,1.1vw,.56rem);font-weight:700;
  background:var(--g-warm);color:#fff;
  padding:0 clamp(2px,.4vw,4px);border-radius:18px;
  white-space:nowrap;line-height:1.4;cursor:pointer;
}

/* CENTER */
.center{
  grid-column:2/4;grid-row:2/4;
  background:var(--bg-card);
  border:1.5px dashed rgba(88,86,214,.36);
  border-radius:clamp(8px,2vw,16px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;gap:clamp(2px,.8vw,6px);
  padding:clamp(5px,1.5vw,12px) clamp(4px,1.2vw,8px);
}
.c-name{
  font-family:'Noto Serif TC',serif;
  font-size:clamp(.8rem,3.5vw,1.4rem);
  font-weight:900;line-height:1.2;word-break:break-all;
  background:var(--g-accent);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.c-detail{font-size:clamp(.55rem,1.9vw,.78rem);color:var(--t2);font-weight:600}
.c-badges{display:flex;flex-wrap:wrap;gap:clamp(2px,.6vw,4px);justify-content:center}
.cbadge{
  font-size:clamp(.42rem,1.2vw,.6rem);font-weight:700;
  padding:clamp(1px,.3vw,2px) clamp(3px,.8vw,7px);
  border-radius:18px;border:1px solid;letter-spacing:.02em;
}
.cb-i{color:var(--indigo);border-color:rgba(88,86,214,.35);background:rgba(88,86,214,.09)}
.cb-o{color:var(--orange);border-color:rgba(255,149,0,.35);background:rgba(255,149,0,.09)}
.cb-g{color:var(--green);border-color:rgba(52,199,89,.35);background:rgba(52,199,89,.09)}

/* ===================== EXPLAIN CARD ===================== */
.ex-card{
  background:var(--bg-card);backdrop-filter:var(--blur);
  border:1px solid var(--border);border-radius:var(--r-xl);
  padding:clamp(14px,3.5vw,20px);margin-bottom:14px;box-shadow:var(--sh-md);
}
.ex-hdr{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px}
.ex-ico{
  width:40px;height:40px;border-radius:11px;
  background:var(--g-accent);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
  box-shadow:0 4px 12px rgba(88,86,214,.3);
}
.ex-title{font-family:'Noto Serif TC',serif;font-size:clamp(.9rem,4.2vw,1.18rem);font-weight:700;color:var(--t1);line-height:1.3}
.ex-sub{font-size:.74rem;color:var(--t2);margin-top:2px;font-weight:500}
.ex-body{font-size:clamp(.8rem,3.5vw,.94rem);line-height:1.78;color:var(--t1);border-top:1px solid var(--border);padding-top:10px}

/* ===================== FORMULA CARD ===================== */
.fml-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.fml-item{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px}
.fml-lbl{font-size:.68rem;font-weight:700;color:var(--t2);letter-spacing:.07em;margin-bottom:3px}
.fml-val{font-family:'Noto Serif TC',serif;font-size:clamp(.98rem,4.2vw,1.36rem);font-weight:700;color:var(--indigo);line-height:1.2}
.fml-unit{font-size:.72rem;color:var(--t2);margin-left:2px;font-weight:400}
.sh-box{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px}
.sh-ttl{font-size:.68rem;font-weight:700;letter-spacing:.09em;color:var(--t2);text-transform:uppercase;margin-bottom:8px}
.sh-chips{display:flex;flex-wrap:wrap;gap:6px}
.shc{font-family:'Noto Serif TC',serif;font-size:clamp(.76rem,3.2vw,.92rem);font-weight:700;padding:5px 11px;border-radius:22px}
.shc-lu  {background:rgba(52,199,89,.13); color:var(--green); border:1px solid rgba(52,199,89,.3)}
.shc-quan{background:rgba(0,122,255,.11);  color:var(--blue);  border:1px solid rgba(0,122,255,.25)}
.shc-ke  {background:rgba(175,82,222,.11); color:var(--purple);border:1px solid rgba(175,82,222,.25)}
.shc-ji  {background:rgba(255,59,48,.11);  color:var(--red);   border:1px solid rgba(255,59,48,.25)}

/* ===================== FOOTER ===================== */
.foot{text-align:center;font-size:.69rem;color:var(--t3);margin-top:20px;border-top:1px solid var(--border);padding-top:13px;line-height:1.8}

/* ===================== ANIM ===================== */
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card,.chart-wrap,.ex-card,.tabs{animation:up .36s ease both}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <header class="hdr">
    <div>
      <div class="hdr-eyebrow">紫微命理 · 命盤系統</div>
      <div class="hdr-title">紫微斗數</div>
    </div>
    <button class="btn-theme" id="btnTheme">🌙</button>
  </header>

  <div class="pc-row">

    <!-- ===== LEFT COL: INPUT CARD ===== -->
    <div class="card pc-left">
      <div class="card-lbl"><i></i>填入出生資料</div>
      <div class="form-row">
        <div class="field">
          <label>姓名</label>
          <input id="iName" type="text" placeholder="陳致遠" autocomplete="off">
          <div class="hist-row" id="histRow"></div>
        </div>
        <div class="field">
          <label>性別</label>
          <div class="sel-w"><select id="iGender"><option value="m">乾造 男</option><option value="f">坤造 女</option></select></div>
        </div>
      </div>
      <div class="field">
        <label>出生時間（公曆）</label>
        <input id="iBirth" type="datetime-local">
      </div>
      <button class="btn-submit" id="btnSub">✦ 更新命盤 · 記憶</button>
    </div>

    <!-- ===== LEFT COL ROW2: FORMULA CARD ===== -->
    <div class="card pc-left2">
      <div class="card-lbl"><i></i>命理公式 · 快速運算</div>
      <div class="fml-grid">
        <div class="fml-item"><div class="fml-lbl">⚖️ 五行局</div><div class="fml-val" id="fEl">水二局</div></div>
        <div class="fml-item"><div class="fml-lbl">📅 起運歲</div><div class="fml-val" id="fAge">2<span class="fml-unit">歲</span></div></div>
        <div class="fml-item"><div class="fml-lbl">🔮 命主星</div><div class="fml-val" id="fMas">祿存</div></div>
        <div class="fml-item"><div class="fml-lbl">✦  身主星</div><div class="fml-val" id="fBod">天梁</div></div>
      </div>
      <div class="sh-box">
        <div class="sh-ttl">四化 · <span id="shYrLbl">丙年</span></div>
        <div class="sh-chips" id="shChips"></div>
      </div>
    </div>

    <!-- ===== CENTER COL: TABS + CHART ===== -->
    <div class="pc-center">
      <div class="tabs">
        <div class="tab on" data-m="base"   onclick="switchTab(this)">本命盤</div>
        <div class="tab"    data-m="decade" onclick="switchTab(this)">大限盤</div>
        <div class="tab"    data-m="annual" onclick="switchTab(this)">流年盤</div>
      </div>
      <div class="yr-bar" id="yrBar">
        <label>📅 流年：</label>
        <select id="selYear" onchange="applyAnnual()"></select>
      </div>
      <div class="chart-wrap">
        <div class="grid4" id="grid"></div>
      </div>
    </div>

    <!-- ===== RIGHT COL: EXPLAIN CARD ===== -->
    <div class="ex-card pc-right">
      <div class="ex-hdr">
        <div class="ex-ico" id="exIco">🔮</div>
        <div>
          <div class="ex-title" id="exTitle">點擊任一宮位 · 獲取解說</div>
          <div class="ex-sub"   id="exSub">點選命盤宮格或大限年齡標籤</div>
        </div>
      </div>
      <div class="ex-body" id="exBody">紫微斗數以出生年月日時起十二宮，配以星曜落宮論吉凶。切換「大限盤」查看人生各十年運勢；「流年盤」查看當年四化引動與流年命宮。</div>
    </div>

  </div><!-- /pc-row -->

  <div class="foot pc-foot">⚡ 資料自動儲存於瀏覽器 · 下次開啟免重新輸入<br><span style="font-size:.62rem">本命盤為示意學習版，星曜配置已預設，僅供學習參考</span></div>
</div><!-- /app -->

<script>
(function(){'use strict';

/* ========== STATIC DATA ========== */
const GAN=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const ZHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const HUA={
  '甲':{'廉貞':'祿','破軍':'權','武曲':'科','太陽':'忌'},
  '乙':{'天機':'祿','天梁':'權','紫微':'科','太陰':'忌'},
  '丙':{'天同':'祿','天機':'權','文昌':'科','廉貞':'忌'},
  '丁':{'太陰':'祿','天同':'權','天機':'科','巨門':'忌'},
  '戊':{'貪狼':'祿','太陰':'權','右弼':'科','天機':'忌'},
  '己':{'武曲':'祿','貪狼':'權','天梁':'科','文曲':'忌'},
  '庚':{'太陽':'祿','武曲':'權','太陰':'科','天同':'忌'},
  '辛':{'巨門':'祿','太陽':'權','文曲':'科','文昌':'忌'},
  '壬':{'天梁':'祿','紫微':'權','左輔':'科','武曲':'忌'},
  '癸':{'破軍':'祿','巨門':'權','太陰':'科','貪狼':'忌'}
};
const DESC={
  '命宮':'命宮代表先天個性格局。紫微＋天相同守，領導力強、行事穩重，具輔佐大局之能，人生主軸清晰，宜居高位發揮才能。',
  '兄弟':'兄弟宮論手足同輩緣。天同性和諧，與手足感情融洽，惟需防依賴性過強，彼此互助則吉。',
  '夫妻':'夫妻宮論感情模式。天梁為蔭星入宮，配偶可能年長或富包容力，感情穩定為重，緣分宜順勢而為。',
  '子女':'子女宮論晚輩緣分。太陰柔和入宮，子女個性溫柔內斂，教養需多給予陪伴與情感支持。',
  '財帛':'財帛宮主財運理財。天府為庫星，守財能力佳，財源穩定可期，適合保守穩健投資策略，積累為宜。',
  '疾厄':'疾厄宮對應身體健康。廉貞＋破軍同守，體質變化幅度大，需留意意外傷害與手術血光，定期健檢為上。',
  '遷移':'遷移宮主外出環境。紫微＋七殺坐守，異地發展易得貴人提攜或掌權機遇，動中求財、居遠得利。',
  '僕役':'交友宮論朋友部屬。天機＋天梁，智謀兼備但多思慮，交友宜精不宜濫，慎選合作夥伴可事半功倍。',
  '官祿':'官祿宮主事業工作。太陽光明發散，適合公職、教育、傳播或需高曝光度之職場，宜主動積極。',
  '田宅':'田宅宮論家產居所。武曲＋貪狼，房地產投資機會多，但需防衝動投機造成損失，宜謹慎評估。',
  '福德':'福德宮主精神享受。天同＋太陰，福澤深厚，喜愛文藝休閒，精神生活豐富，內心平靜易感幸福。',
  '父母':'父母宮論雙親長輩。太陽＋巨門，父母健談積極，早年家庭溝通宜多用心，長輩緣宜主動維繫。'
};
const ICON={'命宮':'⭐','兄弟':'👥','夫妻':'💑','子女':'👶','財帛':'💰','疾厄':'🏥','遷移':'✈️','僕役':'🤝','官祿':'💼','田宅':'🏠','福德':'🎭','父母':'👨‍👩‍👦'};

/* Palace grid positions (1-indexed row, col in 4×4) */
const PALACES=[
  {n:'父母',z:'巳',s:[{t:'b',v:'太陽'},{t:'m',v:'巨門'}],  a:'2–11',    r:1,c:1},
  {n:'福德',z:'午',s:[{t:'m',v:'天同'},{t:'b',v:'太陰'}],  a:'12–21',   r:1,c:2},
  {n:'田宅',z:'未',s:[{t:'b',v:'武曲'},{t:'',v:'貪狼'}],   a:'22–31',   r:1,c:3},
  {n:'官祿',z:'申',s:[{t:'b',v:'太陽'}],                   a:'32–41',   r:1,c:4},
  {n:'僕役',z:'酉',s:[{t:'m',v:'天機'},{t:'',v:'天梁'}],   a:'42–51',   r:2,c:4},
  {n:'遷移',z:'戌',s:[{t:'m',v:'紫微'},{t:'',v:'七殺'}],   a:'52–61',   r:3,c:4},
  {n:'疾厄',z:'亥',s:[{t:'m',v:'廉貞'},{t:'',v:'破軍'}],   a:'62–71',   r:4,c:4},
  {n:'財帛',z:'子',s:[{t:'b',v:'天府'}],                   a:'72–81',   r:4,c:3},
  {n:'子女',z:'丑',s:[{t:'',v:'太陰'}],                    a:'82–91',   r:4,c:2},
  {n:'夫妻',z:'寅',s:[{t:'',v:'天梁'}],                    a:'92–101',  r:4,c:1},
  {n:'兄弟',z:'卯',s:[{t:'m',v:'天同'}],                   a:'102–111', r:3,c:1},
  {n:'命宮',z:'辰',s:[{t:'m',v:'紫微'},{t:'',v:'天相'}],   a:'112–121', r:2,c:1}
];
const HC={'祿':'lu','權':'quan','科':'ke','忌':'ji'};
const SHC={'祿':'shc-lu','權':'shc-quan','科':'shc-ke','忌':'shc-ji'};

/* ========== GRID BUILD ========== */
function buildGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';

  PALACES.forEach(p=>{
    const el=document.createElement('div');
    el.className='cell';
    el.style.gridRow=p.r+'';
    el.style.gridColumn=p.c+'';
    el.dataset.n=p.n;el.dataset.z=p.z;

    const sa=document.createElement('div');sa.className='stars-area';
    p.s.forEach(s=>{
      const sp=document.createElement('span');
      sp.className='star '+(s.t||'');sp.textContent=s.v;sp.dataset.sn=s.v;
      sa.appendChild(sp);
    });
    el.appendChild(sa);

    const pn=document.createElement('div');pn.className='pname';pn.textContent=p.n;
    el.appendChild(pn);

    const zh=document.createElement('span');zh.className='zhi';zh.textContent=p.z;
    el.appendChild(zh);

    const ag=document.createElement('span');ag.className='age';ag.textContent=p.a;
    ag.addEventListener('click',e=>{e.stopPropagation();onAge(p)});
    el.appendChild(ag);

    el.addEventListener('click',()=>onCell(p,el));
    g.appendChild(el);
  });

  /* center 2×2 */
  const cen=document.createElement('div');
  cen.className='center';
  cen.style.gridRow='2/4';cen.style.gridColumn='2/4';
  cen.innerHTML=
    '<div class="c-name" id="cName">陳致遠</div>'+
    '<div class="c-detail" id="cDet">命盤 · 陽男</div>'+
    '<div class="c-badges">'+
      '<span class="cbadge cb-i" id="bEl">水二局</span>'+
      '<span class="cbadge cb-o" id="bGn">陽男</span>'+
      '<span class="cbadge cb-g" id="bYr">丙年</span>'+
    '</div>';
  g.appendChild(cen);
}

/* ========== EVENTS ========== */
function onCell(p,el){
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  const stars=p.s.map(s=>s.v).join('、');
  setEx(ICON[p.n]||'🏯',`${p.n}宮（${p.z}）`,`主星：${stars||'無主星'}  ╱  大限：${p.a}歲`,DESC[p.n]||'此宮位星曜需綜合三方四正參看。');
}
function onAge(p){
  const stars=p.s.map(s=>s.v).join('、');
  setEx('⏳',`大限 ${p.a}歲（${p.n}宮）`,`行至：${p.n}  ╱  主星：${stars||'無'}`,
    `大限走入${p.n}宮（${p.z}），此十年運勢重心在${p.n}相關事務。主星${stars}主導格局，宜把握宮位特質積極發展，並注意三方四正沖照加減分之效。`);
}
function setEx(ico,ti,su,bo){
  document.getElementById('exIco').textContent=ico;
  document.getElementById('exTitle').textContent=ti;
  document.getElementById('exSub').textContent=su;
  document.getElementById('exBody').textContent=bo;
}

/* ========== ANNUAL ========== */
function ganZhi(y){return{gan:GAN[(y-4)%10],zhi:ZHI[(y-4)%12]}}
function huaOf(y){return HUA[ganZhi(y).gan]||HUA['丙']}
function clearAnnual(){
  document.querySelectorAll('.hb').forEach(t=>t.remove());
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('ann'));
}
window.applyAnnual=function(){
  clearAnnual();
  const y=parseInt(document.getElementById('selYear').value);
  const {gan,zhi:tz}=ganZhi(y);
  const hua=huaOf(y);
  document.querySelectorAll('.cell').forEach(el=>{
    const zh=el.querySelector('.zhi');
    if(zh&&zh.textContent===tz) el.classList.add('ann');
  });
  document.querySelectorAll('.cell .star').forEach(sp=>{
    const sn=sp.dataset.sn;
    if(sn&&hua[sn]){
      const b=document.createElement('span');
      b.className='hb '+(HC[hua[sn]]||'');b.textContent=hua[sn];sp.appendChild(b);
    }
  });
  updateSH(y);
  const bYr=document.getElementById('bYr');if(bYr)bYr.textContent=gan+'年';
};
function updateSH(y){
  const {gan}=ganZhi(y);const hua=huaOf(y);
  document.getElementById('shYrLbl').textContent=gan+'年';
  const cont=document.getElementById('shChips');cont.innerHTML='';
  for(const[star,h] of Object.entries(hua)){
    const sp=document.createElement('span');
    sp.className='shc '+(SHC[h]||'');sp.textContent=star+h;cont.appendChild(sp);
  }
}

/* ========== FORMULA ========== */
function setFormula(g){
  const m=g==='m';
  document.getElementById('fEl').textContent=m?'水二局':'木三局';
  document.getElementById('fAge').innerHTML=(m?'2':'3')+'<span class="fml-unit">歲</span>';
  document.getElementById('fMas').textContent=m?'祿存':'廉貞';
  document.getElementById('fBod').textContent=m?'天梁':'天同';
  const bEl=document.getElementById('bEl');const bGn=document.getElementById('bGn');
  if(bEl)bEl.textContent=m?'水二局':'木三局';
  if(bGn)bGn.textContent=m?'陽男':'陰女';
}

/* ========== STORAGE ========== */
const K='ziwei4',KH='ziwei4h';
function load(){try{return JSON.parse(localStorage.getItem(K)||'null')}catch{return null}}
function save(d){try{localStorage.setItem(K,JSON.stringify(d))}catch{}}
function loadH(){try{return JSON.parse(localStorage.getItem(KH)||'[]')}catch{return[]}}
function saveH(a){try{localStorage.setItem(KH,JSON.stringify(a.slice(0,8)))}catch{}}
function addH(n){if(!n)return;let h=loadH().filter(x=>x!==n);h.unshift(n);saveH(h);renderH()}
function renderH(){
  const row=document.getElementById('histRow');row.innerHTML='';
  loadH().forEach(n=>{
    const ch=document.createElement('div');ch.className='hist-chip';ch.textContent=n;
    ch.onclick=()=>{document.getElementById('iName').value=n;liveName(n)};
    row.appendChild(ch);
  });
}
function liveName(v){const el=document.getElementById('cName');if(el)el.textContent=(v.trim()||'命造')}

/* ========== YEAR SELECTOR ========== */
function initYears(){
  const sel=document.getElementById('selYear');sel.innerHTML='';
  const now=new Date().getFullYear();
  for(let y=now-6;y<=now+6;y++){
    const o=document.createElement('option');
    const{gan,zhi}=ganZhi(y);
    o.value=y;o.textContent=y+'年（'+gan+zhi+'）';
    if(y===now)o.selected=true;sel.appendChild(o);
  }
}
function curY(){return parseInt(document.getElementById('selYear').value)||new Date().getFullYear()}

/* ========== TABS ========== */
window.switchTab=function(el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const yrBar=document.getElementById('yrBar');
  if(el.dataset.m==='annual'){yrBar.classList.add('show');applyAnnual()}
  else{yrBar.classList.remove('show');clearAnnual()}
};

/* ========== SUBMIT ========== */
document.getElementById('btnSub').onclick=function(){
  const name=(document.getElementById('iName').value||'').trim()||'命造';
  const g=document.getElementById('iGender').value;
  const b=document.getElementById('iBirth').value;
  save({name,g,b});addH(name);
  liveName(name);
  const cd=document.getElementById('cDet');if(cd)cd.textContent='命盤 · '+(g==='m'?'陽男':'陰女');
  setFormula(g);updateSH(curY());
  const on=document.querySelector('.tab.on');
  if(on&&on.dataset.m==='annual')applyAnnual();else clearAnnual();
  this.textContent='✓ 已儲存！';
  setTimeout(()=>{this.textContent='✦ 更新命盤 · 記憶'},1600);
};

/* ========== THEME ========== */
const btnTh=document.getElementById('btnTheme');
function setTheme(dark){
  document.body.classList.toggle('dark',dark);
  btnTh.textContent=dark?'☀️':'🌙';
  try{localStorage.setItem('ziwei4t',dark?'1':'0')}catch{}
}
btnTh.onclick=()=>setTheme(!document.body.classList.contains('dark'));

/* ========== INIT ========== */
(function init(){
  const th=localStorage.getItem('ziwei4t');
  if(th!==null)setTheme(th==='1');
  else if(window.matchMedia('(prefers-color-scheme:dark)').matches)setTheme(true);

  buildGrid();initYears();

  const d=load();
  if(d){
    document.getElementById('iName').value=d.name||'陳致遠';
    document.getElementById('iGender').value=d.g||'m';
    document.getElementById('iBirth').value=d.b||'1990-06-15T10:30';
  }else{
    document.getElementById('iName').value='陳致遠';
    document.getElementById('iBirth').value='1990-06-15T10:30';
  }

  const nm=(document.getElementById('iName').value||'').trim()||'命造';
  const gv=document.getElementById('iGender').value;
  liveName(nm);
  const cd=document.getElementById('cDet');if(cd)cd.textContent='命盤 · '+(gv==='m'?'陽男':'陰女');
  setFormula(gv);updateSH(curY());renderH();

  document.getElementById('iName').addEventListener('input',e=>liveName(e.target.value));
})();

})();
</script>
</body>
</html>
